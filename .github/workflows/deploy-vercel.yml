name: Deploy to Vercel

# Push to main  -> production deployment (runs DB migrations first)
# Pull request  -> preview deployment (its own URL, no migrations)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push/PR update supersedes an in-flight deploy of the same ref.
concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  # Org/project IDs are identifiers, not credentials (they do nothing without
  # VERCEL_TOKEN), so they live here in the clear. The ONLY GitHub secret you
  # need to add is VERCEL_TOKEN.
  VERCEL_ORG_ID: team_uEQHNf8APFtN9zqaRYn1d1zf
  VERCEL_PROJECT_ID: prj_QSf7wFUXvimQh1h1kVY7sXgYIleG

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Secrets aren't exposed to fork PRs, so skip those runs instead of failing.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # matches Vercel's default; satisfies Prisma's Node floor
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi

      # Pulls the project's env vars + settings from Vercel into .vercel/
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.target.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      # Builds locally (installs deps -> postinstall runs `prisma generate`,
      # then `next build` which also emits the Serwist service worker).
      - name: Build project artifacts
        run: vercel build ${{ steps.target.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}

      # Apply pending migrations to the production database before shipping the
      # code that expects them. Additive-only migrations keep this safe.
      # DATABASE_URL comes from `vercel pull` above (written to
      # .vercel/.env.production.local), so it stays in one place — the Vercel
      # project env — instead of being duplicated as a GitHub secret.
      - name: Run database migrations (production only)
        if: steps.target.outputs.environment == 'production'
        run: |
          set -a
          . .vercel/.env.production.local
          set +a
          npx prisma migrate deploy

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt ${{ steps.target.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "### ✅ Deployed (${{ steps.target.outputs.environment }})" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"
